name: Reusable — release-please

on:
  workflow_call:
    inputs:
      config_file:
        description: 'Path to release-please config.'
        required: false
        type: string
        default: 'release-please-config.json'
      manifest_file:
        description: 'Path to release-please manifest.'
        required: false
        type: string
        default: '.release-please-manifest.json'
    outputs:
      release_created:
        description: '"true" if a release was cut this run (commits pushed main → tag + release).'
        value: ${{ jobs.release.outputs.release_created }}
      tag_name:
        description: 'The new tag, e.g. v1.2.3.'
        value: ${{ jobs.release.outputs.tag_name }}
      version:
        description: 'The new version without v prefix, e.g. 1.2.3.'
        value: ${{ jobs.release.outputs.version }}
      major:
        value: ${{ jobs.release.outputs.major }}
      minor:
        value: ${{ jobs.release.outputs.minor }}
      patch:
        value: ${{ jobs.release.outputs.patch }}

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
      major: ${{ steps.release.outputs.major }}
      minor: ${{ steps.release.outputs.minor }}
      patch: ${{ steps.release.outputs.patch }}
    steps:
      - name: release-please
        id: release
        uses: googleapis/release-please-action@a02a34c4d625f9be7cb89156071d8567266a2445 # v4.3.0
        with:
          config-file: ${{ inputs.config_file }}
          manifest-file: ${{ inputs.manifest_file }}
