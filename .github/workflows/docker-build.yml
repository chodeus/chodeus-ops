name: Reusable — Docker build & push

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name (defaults to repo name). Pushed as ghcr.io/<owner>/<name>.'
        required: false
        type: string
        default: ''
      dockerfile_path:
        description: 'Path to Dockerfile (default: Dockerfile at repo root).'
        required: false
        type: string
        default: 'Dockerfile'
      build_context:
        description: 'Build context directory (default: repo root).'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Comma-separated platforms.'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Push to GHCR. Set false for PR builds.'
        required: false
        type: boolean
        default: true
      trivy_severity:
        description: 'Trivy severities that fail the build.'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      build_args:
        description: 'Newline-separated KEY=VALUE build args.'
        required: false
        type: string
        default: ''
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Resolve image name
        id: name
        run: |
          NAME="${{ inputs.image_name }}"
          if [ -z "$NAME" ]; then NAME="${GITHUB_REPOSITORY##*/}"; fi
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        with:
          images: ${{ steps.name.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.build_context }}
          severity: ${{ inputs.trivy_severity }}
          exit-code: '0'
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
