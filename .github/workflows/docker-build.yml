name: Reusable — Docker build & push

on:
  workflow_call:
    inputs:
      image_name:
        description: 'Image name (defaults to repo name). Pushed as ghcr.io/<owner>/<name>.'
        required: false
        type: string
        default: ''
      dockerfile_path:
        description: 'Path to Dockerfile (default: Dockerfile at repo root).'
        required: false
        type: string
        default: 'Dockerfile'
      build_context:
        description: 'Build context directory (default: repo root).'
        required: false
        type: string
        default: '.'
      platforms:
        description: 'Comma-separated platforms.'
        required: false
        type: string
        default: 'linux/amd64,linux/arm64'
      push:
        description: 'Push to GHCR. Set false for PR builds.'
        required: false
        type: boolean
        default: true
      trivy_severity:
        description: 'Trivy severities that fail the build.'
        required: false
        type: string
        default: 'CRITICAL,HIGH'
      build_args:
        description: 'Newline-separated KEY=VALUE build args.'
        required: false
        type: string
        default: ''
    secrets:
      DISCORD_WEBHOOK_URL:
        required: false

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Resolve image name
        id: name
        run: |
          NAME="${{ inputs.image_name }}"
          if [ -z "$NAME" ]; then NAME="${GITHUB_REPOSITORY##*/}"; fi
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${NAME,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@29109295f81e9208d7d86ff1c6c12d2833863392 # v3.6.0

      - name: Set up Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Login to GHCR
        if: ${{ inputs.push }}
        uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        uses: docker/metadata-action@c1e51972afc2121e065aed6d45c65596fe445f3f # v5.8.0
        with:
          images: ${{ steps.name.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        id: build
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          platforms: ${{ inputs.platforms }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ inputs.build_args }}
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy scan (filesystem)
        uses: aquasecurity/trivy-action@18f2510ee396bbf400402947b394f2dd8c87dbb0 # 0.29.0
        with:
          scan-type: fs
          scan-ref: ${{ inputs.build_context }}
          severity: ${{ inputs.trivy_severity }}
          exit-code: '0'
          format: sarif
          output: trivy-fs.sarif

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@4e828ff8d448a8a6e532957b1811f387a63867e8 # v3.29.4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs
