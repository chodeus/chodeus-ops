name: Reusable — CodeQL

on:
  workflow_call:
    inputs:
      languages:
        description: 'JSON array of languages, e.g. ["python","javascript"]'
        required: true
        type: string
      queries:
        required: false
        type: string
        default: 'security-extended,security-and-quality'

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ${{ fromJSON(inputs.languages) }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Init CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          languages: ${{ matrix.language }}
          queries: ${{ inputs.queries }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2

      - name: Analyze
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a # v3.35.2
        with:
          category: /language:${{ matrix.language }}
