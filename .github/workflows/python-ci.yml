name: Reusable — Python CI

on:
  workflow_call:
    inputs:
      python_versions:
        description: 'JSON array of Python versions, e.g. ["3.11","3.12"]'
        required: false
        type: string
        default: '["3.12"]'
      run_lint:
        required: false
        type: boolean
        default: true
      run_tests:
        required: false
        type: boolean
        default: true
      install_command:
        description: 'Dependency install command.'
        required: false
        type: string
        default: 'pip install -e .[dev] || pip install -r requirements-dev.txt || pip install -r requirements.txt || true'
      test_command:
        required: false
        type: string
        default: 'pytest -q'
      lint_command:
        required: false
        type: string
        default: 'ruff check . && ruff format --check .'

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ${{ fromJSON(inputs.python_versions) }}
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff pytest pytest-cov
          ${{ inputs.install_command }}

      - name: Lint
        if: ${{ inputs.run_lint }}
        run: ${{ inputs.lint_command }}

      - name: Test
        if: ${{ inputs.run_tests }}
        run: ${{ inputs.test_command }}
